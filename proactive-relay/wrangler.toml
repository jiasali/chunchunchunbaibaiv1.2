name = "tabula-proactive-relay"
main = "worker.js"
compatibility_date = "2024-01-01"

# 定时触发：按小时扫描应在后台调 API 并推送（与游戏内间隔一致，由 lastProactiveAt 判断）
[triggers]
crons = ["0 * * * *"]

[[kv_namespaces]]
binding = "PROACTIVE_KV"
id = "REPLACE_WITH_YOUR_KV_ID"

[vars]
# 可在 Cloudflare 控制台用密文存放：VAPID_PRIVATE_KEY = '{"kty":"EC",...}'
# 不要提交真实私钥到 Git
