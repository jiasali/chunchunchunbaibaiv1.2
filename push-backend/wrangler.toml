name = "tabula-proactive-push"
main = "index.js"
compatibility_date = "2024-01-01"

[vars]
# 游戏页面来源，用于 CORS，例如 https://xxx.github.io
GAME_ORIGIN = "*"

# 先运行: npx wrangler kv namespace create PROACTIVE_KV
# 将返回的 id 填入下方
[[kv_namespaces]]
binding = "PROACTIVE_KV"
id = "027f17546fa7444284ae6cb57f8b81ba"

[triggers]
crons = ["*/15 * * * *"]
