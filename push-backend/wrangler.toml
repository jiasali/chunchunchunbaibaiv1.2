name = "tabula-proactive-push"
main = "index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# 游戏页面来源，用于 CORS，例如 https://xxx.github.io
GAME_ORIGIN = "*"

# 先运行: npx wrangler kv namespace create PROACTIVE_KV
# 将返回的 id 填入下方
[[kv_namespaces]]
binding = "PROACTIVE_KV"
id = "027f17546fa7444284ae6cb57f8b81ba"

[triggers]
# 每 1 分钟执行一次，支持最短间隔约 0.017 小时（1 分钟）；Cloudflare cron 最小粒度为分钟，无法实现 0.01 小时（36 秒）
crons = ["* * * * *"]
